<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuku-pizza</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Open+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/navAndFooter.css" />
    <link rel="stylesheet" href="styles/contact.css" />
  </head>

  <body>
    <nav>
      <ul class="nav-left">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
      </ul>

      <div class="logo">
        <span>Kuku-pizza</span>
      </div>

      <button class="hamburger">&#9776;</button>

      <ul class="nav-right">
        <li><a href="basket.html">Basket</a></li>
        <li><a class="active" href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <main>
      <div class="contact-wrapper">
        <div class="contact-card">
          <h1>Contact Kuku-Pizza</h1>

          <p class="role">👨‍💻 Software Developer & Pizza Maker 🍕</p>

          <div class="contact-item">
            <span>Yevhenii Porkul</span>
          </div>

          <!-- INTERNAL + EXTERNAL LINKS -->
          <div class="contact-item">
            <a href="#form">Go to Contact Form ↓</a>
          </div>

          <div class="contact-item">
            <a
              href="https://www.youtube.com/watch?v=bvtvB3-Sc7o"
              target="_blank"
              >How to make a pizza</a
            >
          </div>

          <div class="contact-item">
            <a href="https://github.com/Kukuxer-atu" target="_blank">
              github.com/Kukuxer-atu
            </a>
          </div>

          <div class="contact-item">
            <a href="https://instagram.com/kukuxer" target="_blank">
              @kukuxer
            </a>
          </div>
        </div>

        <img
          src="https://images.unsplash.com/photo-1594007654729-407eedc4be65"
          class="float-img"
          alt="Pizza"
        />

        <form id="form" class="contact-form" onsubmit="return validateForm();">
          <h2>Send Us a Message</h2>

          <label>Name <span class="required">*</span></label>
          <input type="text" id="name" />

          <label>Email <span class="required">*</span></label>
          <input type="email" id="email" />

          <label>Message <span class="required">*</span></label>
          <textarea id="message"></textarea>

          <button type="submit">Send Message</button>

          <p id="form-msg"></p>
        </form>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 Kuku-pizza All rights reserved ©.</p>
    </footer>

    <script>
      const hamburger = document.querySelector(".hamburger");
      const nav = document.querySelector("nav");

      hamburger.addEventListener("click", () => {
        nav.classList.toggle("open");
      });

      function validateForm() {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const message = document.getElementById("message").value;
        const msg = document.getElementById("form-msg");

        if (name === "" || email === "" || message === "") {
          msg.style.color = "red";
          msg.innerText = "Please fill in all required fields!";
          return false;
        }

        if (!email.includes("@")) {
          msg.style.color = "red";
          msg.innerText = "Please enter a valid email!";
          return false;
        }

        msg.style.color = "green";
        msg.innerText = "Message sent successfully!";
        return false;
      }
    </script>
  </body>
</html>
